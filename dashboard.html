<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Shot - Admin</title>
    <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
    <header>
        <h1>One<span>Shot</span> Admin</h1>
        <div class="live-status">● Live Orders</div>
    </header>
    <div class="alert-banner" id="alertBanner">🚨 NEW ORDER RECEIVED!</div>
    <div class="orders-grid" id="ordersGrid"></div>
    
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const app = initializeApp(YOUR_FIREBASE_CONFIG_HERE);
    const db = getDatabase(app);

    // Listen for real-time updates
    onValue(ref(db, 'orders/'), (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = '';
        
        if (!data) return;

        Object.keys(data).forEach(key => {
            const order = data[key];
            grid.innerHTML += `
                <div class="order-card">
                    <h3>${order.id}</h3>
                    <p>${order.items.join(', ')}</p>
                    <p>Total: ${order.total}</p>
                    <button class="btn" onclick="deleteOrder('${key}')">Done</button>
                </div>
            `;
        });
    });

    window.deleteOrder = function(key) {
        remove(ref(db, 'orders/' + key));
    };
</script>
    <script src="./dashboard.js"></script>
</body>
</html>
