<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Shot - Admin</title>
    <link rel="stylesheet" href="./dashboard.css">
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>One<span>Shot</span> Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label style="color:var(--text-muted); display:block; margin-bottom:5px;">Email Address</label>
                    <input type="email" id="adminEmail" placeholder="admin@oneshot.com" required>
                </div>
                <div class="form-group">
                    <label style="color:var(--text-muted); display:block; margin-bottom:5px;">Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-add">Access Dashboard</button>
                <div id="loginError" class="login-error">Invalid email or password.</div>
            </form>
        </div>
    </div>

    <header>
        <h1>One<span>Shot</span> Admin</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="live-status">● Live Orders</div>
            <button id="btnLogout" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 6px 12px; border-radius: 6px; cursor: pointer;">Logout</button>
        </div>
    </header>

    <div class="admin-controls">
        <div class="stats-panel">
            <h2>Today's Overview</h2>
            <div class="stat-box">Pending Orders: <span id="pendingCount">0</span></div>
            <div class="stat-box">Total Revenue: $<span id="revenueTotal">0.00</span></div>
        </div>

        <div class="menu-panel">
            <h2>Add New Menu Item</h2>
            <form id="addMenuForm">
                <div class="form-group">
                    <input type="text" id="itemName" placeholder="Item Name" required>
                </div>
                <div class="form-group">
                    <input type="number" id="itemPrice" placeholder="Price (e.g. 4.50)" step="0.01" required>
                </div>
                <!-- Replace the Image URL form-group with this -->
                 <div class="form-group file-upload-wrapper">
                <label for="itemImg" class="file-upload-label">
                 <i class="fas fa-image"></i> <span id="fileName">Choose an image from gallery...</span>
                </label>
                <input type="file" id="itemImg" accept="image/*" style="display: none;">
                </div>
                <!-- Add this preview container right below it -->
                <div id="imgPreview" style="display: none; margin-bottom: 15px; text-align: center;">
                    <img id="previewImage" src="" style="width: 100%; max-width: 200px; border-radius: 8px; border: 2px solid #3A302C; object-fit: cover;">
                </div>
                </div>
                <div class="form-group">
                    <select id="itemCategory">
                        <option value="drinks">Drinks</option>
                        <option value="food">Food</option>
                    </select>
                </div>
                <button type="submit" class="btn-add">Add to Database</button>
            </form>
        </div>

        <div class="menu-list-panel">
            <h2>Database Menu</h2>
            <div id="adminMenuList">
                <p style="color: var(--text-muted);">Loading menu...</p>
            </div>
        </div>
    </div>

    <div class="alert-banner" id="alertBanner"></div>
    <div class="orders-grid" id="ordersGrid"></div>
    <div id="printArea"></div>
    
    <script type="module" src="./dashboard.js"></script>
</body>
</html>
